name: linter

on:
  push:
    branches:
      - develop
      - main
      - master
      - feature/v1-production-ready
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - feature/v1-production-ready
      - workos

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader
          npm ci

      - name: Run Pint
        run: |
          vendor/bin/pint --format agent
          git diff --exit-code

      - name: Generate Wayfinder Types
        run: php artisan wayfinder:generate --with-form --no-interaction

      - name: Check Frontend Formatting
        run: npm run format:check

      - name: Lint Frontend
        run: npm run lint

      - name: Check TypeScript
        run: npm run types
